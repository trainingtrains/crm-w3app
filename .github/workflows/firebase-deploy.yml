name: Deploy Firebase

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - run: npm run build

      - run: npm install -g firebase-tools

      - run: firebase deploy --only hosting --token "${{ secrets.FIREBASE_TOKEN }}"